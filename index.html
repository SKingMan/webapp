<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI WebApp 作品合集</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 500: '#3b82f6', 600: '#2563eb' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .gradient-text { background: linear-gradient(90deg, #3b82f6, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors min-h-screen">
  <div id="app"></div>

  <script>
    // ============================================================
    // 配置
    // ============================================================
    // 统一通过 openresty 反代访问 PocketBase（不再直连 8090）
    const PB = location.origin + "/pb";

    // 6 个 demo 数据（从原项目提取的）
    const DEMO = [
      { id: "demo-chatgpt", name: "ChatGPT", url: "https://chatgpt.com", description: "OpenAI 推出的对话式 AI 助手，支持文本生成、代码编写、图像理解等多模态能力。", createdAt: "2024-01-01T00:00:00.000Z" },
      { id: "demo-claude", name: "Claude", url: "https://claude.ai", description: "Anthropic 开发的 AI 助手，擅长长文本处理、代码生成和复杂推理，支持 Artifacts 实时预览。", createdAt: "2024-01-02T00:00:00.000Z" },
      { id: "demo-gemini", name: "Gemini", url: "https://gemini.google.com", description: "Google 推出的多模态 AI 模型，深度集成 Google 生态，支持图片、视频、代码等多种输入。", createdAt: "2024-01-03T00:00:00.000Z" },
      { id: "demo-midjourney", name: "Midjourney", url: "https://www.midjourney.com", description: "AI 图像生成工具，通过文字描述生成高质量的艺术作品和设计图。", createdAt: "2024-01-04T00:00:00.000Z" },
      { id: "demo-notion", name: "Notion AI", url: "https://www.notion.so/product/ai", description: "集成 AI 能力的笔记和知识管理平台，支持智能写作、摘要、翻译等功能。", createdAt: "2024-01-05T00:00:00.000Z" },
      { id: "demo-vercel", name: "v0 by Vercel", url: "https://v0.dev", description: "Vercel 推出的 AI 前端界面生成工具，通过文字描述即可快速生成 React/Tailwind 页面代码。", createdAt: "2024-01-06T00:00:00.000Z" }
    ];

    // 分类（用于筛选）
    const CATEGORIES = {
      "对话助手": ["chat", "assistant", "助手", "对话", "chatbot"],
      "图像生成": ["image", "图像", "图片", "art", "design", "midjourney", "dalle", "stable"],
      "代码工具": ["code", "代码", "编程", "developer", "v0", "bolt", "lovable", "cursor"],
      "写作助手": ["write", "写作", "文字", "文案", "copy", "content"],
      "知识管理": ["notion", "笔记", "知识", "文档", "document", "research"],
      "视频生成": ["video", "视频", "sora", "runway"],
      "音频语音": ["audio", "语音", "音频", "voice", "tts", "speech", "music", "音乐"],
      "效率工具": ["productivity", "效率", "自动", "workflow", "流程"]
    };

    // ============================================================
    // 数据层
    // ============================================================
    let remoteTools = []; // 从 PB 拉取的（不含 demo）
    let loadingTools = true;

    async function loadTools() {
      loadingTools = true;
      render();
      try {
        const r = await fetch(PB + "/api/collections/tools/records?perPage=200&sort=-id");
        if (!r.ok) throw new Error("HTTP " + r.status);
        const d = await r.json();
        remoteTools = (d.items || []).map(function (i) {
          return {
            id: i.id,
            name: i.name,
            url: i.url,
            description: i.description || "",
            createdAt: i.created,
            isUserSubmitted: true
          };
        });
      } catch (e) {
        console.warn("Failed to load from PocketBase:", e);
        remoteTools = [];
      }
      loadingTools = false;
      render();
    }

    function allTools() {
      return remoteTools.concat(DEMO);
    }

    function findTool(id) {
      return allTools().find(function (t) { return t.id === id; });
    }

    function getCategories(tools) {
      const cats = new Set();
      for (const t of tools) {
        const text = (t.name + " " + (t.description || "")).toLowerCase();
        for (const [cat, keywords] of Object.entries(CATEGORIES)) {
          if (keywords.some(function (k) { return text.includes(k); })) {
            cats.add(cat);
          }
        }
      }
      if (cats.size === 0) cats.add("AI 应用");
      return Array.from(cats).sort();
    }

    // ============================================================
    // 路由（hash-based）
    // ============================================================
    function getRoute() {
      const hash = location.hash.slice(1) || "/";
      if (hash.startsWith("/app/")) {
        return { name: "detail", id: hash.slice(5) };
      }
      if (hash === "/submit") return { name: "submit" };
      return { name: "home" };
    }

    window.addEventListener("hashchange", render);

    // ============================================================
    // 工具函数
    // ============================================================
    function escapeHtml(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function initialsOf(name) {
      return name.split(" ").map(function (w) { return w[0] || ""; })
        .join("").toUpperCase().slice(0, 2);
    }

    function colorOf(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) {
        h = name.charCodeAt(i) + ((h << 5) - h);
      }
      return "hsl(" + Math.abs(h % 360) + ", 65%, 55%)";
    }

    function formatDate(iso) {
      if (!iso) return "";
      return new Date(iso).toLocaleDateString("zh-CN", { year: "numeric", month: "long", day: "numeric" });
    }

    // ============================================================
    // 渲染组件
    // ============================================================
    function renderHeader(searchValue) {
      return `
        <header class="sticky top-0 z-50 w-full bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-100 dark:border-gray-700">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 gap-4">
              <a href="#/" class="flex items-center space-x-3 flex-shrink-0">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold">AI</div>
                <span class="text-lg font-semibold text-gray-900 dark:text-white hidden sm:inline">AI WebApp 作品集</span>
              </a>
              <div class="flex-1 max-w-xl hidden md:block">
                <div class="relative">
                  <input type="search" placeholder="搜索 AI 应用..." value="${escapeHtml(searchValue || "")}"
                    oninput="onSearchInput(this.value)"
                    class="w-full px-4 py-2 pl-10 text-sm bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="toggleDark()" class="p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors" title="切换主题">
                  <span id="theme-icon">☀</span>
                </button>
                <a href="#/submit" class="px-4 py-2 text-sm font-medium text-white bg-black dark:bg-white dark:text-black rounded-full hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors">+ 提交作品</a>
              </div>
            </div>
            <div class="md:hidden pb-3">
              <input type="search" placeholder="搜索 AI 应用..." value="${escapeHtml(searchValue || "")}"
                oninput="onSearchInput(this.value)"
                class="w-full px-4 py-2 pl-10 text-sm bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
        </header>
      `;
    }

    function renderFooter() {
      return `
        <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-8 mt-auto">
          <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500 dark:text-gray-400">
            <p>© ${new Date().getFullYear()} AI WebApp 作品集 · 发现和分享优秀的 AI Web 应用</p>
          </div>
        </footer>
      `;
    }

    function renderToolCard(tool) {
      return `
        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6 hover:shadow-lg transition-all hover:-translate-y-0.5 cursor-pointer"
             onclick="location.hash='#/app/${escapeHtml(tool.id)}'">
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-xl flex-shrink-0 flex items-center justify-center text-white text-lg font-bold" style="background-color:${colorOf(tool.name)}">${escapeHtml(initialsOf(tool.name))}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <h3 class="font-semibold text-gray-900 dark:text-white truncate">${escapeHtml(tool.name)}</h3>
                ${tool.isUserSubmitted ? '<span class="flex-shrink-0 inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300">社区</span>' : ''}
              </div>
              ${tool.description ? `<p class="text-sm text-gray-500 dark:text-gray-400 mt-1 line-clamp-2">${escapeHtml(tool.description)}</p>` : ''}
              <div class="mt-3 flex items-center gap-3">
                <a href="${escapeHtml(tool.url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()"
                   class="inline-flex items-center gap-1 text-sm font-medium text-blue-600 dark:text-blue-400 hover:text-blue-700">
                  访问网站
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                </a>
                <a href="#/app/${escapeHtml(tool.id)}" onclick="event.stopPropagation()" class="text-sm text-gray-400 hover:text-gray-600">详情</a>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ============================================================
    // 页面：首页
    // ============================================================
    function renderHome(state) {
      const tools = allTools();
      const filtered = tools.filter(function (t) {
        const matchSearch = !state.search || t.name.toLowerCase().includes(state.search.toLowerCase()) ||
          (t.description || "").toLowerCase().includes(state.search.toLowerCase());
        const matchCat = !state.category || getCategories([t]).includes(state.category);
        return matchSearch && matchCat;
      });

      const categories = getCategories(tools);

      return `
        ${renderHeader(state.search)}
        <main class="max-w-7xl mx-auto py-8">
          <div class="text-center px-4 sm:px-6 lg:px-8">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 rounded-full text-sm font-medium mb-4">
              ✨ 发现优秀 AI Web 应用
            </div>
            <h1 class="text-4xl font-bold text-gray-900 dark:text-white">
              AI WebApp <span class="inline-block gradient-text px-3 py-1 rounded-lg">作品合集</span>
            </h1>
            <p class="mt-4 text-lg text-gray-600 dark:text-gray-400 max-w-2xl mx-auto">
              探索社区精选的 AI Web 应用，或提交你自己的作品与大家分享。
            </p>
          </div>

          ${categories.length > 0 ? `
            <div class="flex flex-wrap gap-2 py-6 px-4 sm:px-6 lg:px-8 mt-4">
              <button onclick="onCategoryClick(null)" class="px-4 py-2 rounded-full text-sm font-medium transition-colors ${state.category === null ? 'bg-black dark:bg-white text-white dark:text-black' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200'}">全部</button>
              ${categories.map(function (c) {
                return `<button onclick="onCategoryClick('${escapeHtml(c)}')" class="px-4 py-2 rounded-full text-sm font-medium transition-colors ${state.category === c ? 'bg-black dark:bg-white text-white dark:text-black' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200'}">${escapeHtml(c)}</button>`;
              }).join("")}
            </div>
          ` : ""}

          <div class="px-4 sm:px-6 lg:px-8 mb-4">
            <p class="text-sm text-gray-500 dark:text-gray-400">
              ${loadingTools ? "加载中..." : "共 " + filtered.length + " 个应用"}${state.search ? ` · 搜索 "${escapeHtml(state.search)}"` : ""}${state.category ? ` · 分类 "${escapeHtml(state.category)}"` : ""}
            </p>
          </div>

          <div class="grid gap-6 px-4 sm:px-6 lg:px-8 sm:grid-cols-2 lg:grid-cols-3">
            ${filtered.map(function (t) { return renderToolCard(t); }).join("")}
          </div>

          ${filtered.length === 0 ? `
            <div class="text-center py-20 px-4">
              <p class="text-gray-500 dark:text-gray-400 text-lg mb-4">没有找到匹配的应用</p>
              <button onclick="clearFilters()" class="text-blue-600 hover:underline">清除筛选条件</button>
            </div>
          ` : ""}
        </main>
        ${renderFooter()}
      `;
    }

    // ============================================================
    // 页面：详情
    // ============================================================
    function renderDetail(id) {
      const tool = findTool(id);
      if (!tool) {
        return `
          ${renderHeader("")}
          <div class="min-h-[60vh] flex items-center justify-center">
            <div class="text-center">
              <h1 class="text-2xl font-bold mb-4 text-gray-900 dark:text-white">应用未找到</h1>
              <a href="#/" class="text-blue-500 hover:underline">返回作品集</a>
            </div>
          </div>
          ${renderFooter()}
        `;
      }

      const shareUrl = location.href;

      async function doShare() {
        if (navigator.share) {
          try { await navigator.share({ title: tool.name, text: tool.description || tool.name, url: shareUrl }); }
          catch (e) {}
        } else {
          try { await navigator.clipboard.writeText(shareUrl); alert("链接已复制到剪贴板！"); }
          catch (e) { alert("分享失败，请手动复制 URL"); }
        }
      }

      return `
        ${renderHeader("")}
        <div class="container mx-auto px-4 py-8 max-w-3xl">
          <a href="#/" class="inline-flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white mb-8">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            返回作品集
          </a>
          <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6 sm:p-8">
            <div class="flex flex-col sm:flex-row items-start gap-6 mb-8">
              <div class="w-20 h-20 rounded-2xl flex-shrink-0 flex items-center justify-center text-white text-3xl font-bold" style="background-color:${colorOf(tool.name)}">${escapeHtml(initialsOf(tool.name))}</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-3 flex-wrap">
                  <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white">${escapeHtml(tool.name)}</h1>
                  ${tool.isUserSubmitted ? '<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300">社区用户提交</span>' : ''}
                </div>
                <a href="${escapeHtml(tool.url)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 mt-2 text-sm text-blue-600 dark:text-blue-400 hover:underline break-all">${escapeHtml(tool.url)}</a>
              </div>
            </div>

            ${tool.description ? `
              <div class="mb-8">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-2">简介</h2>
                <p class="text-gray-600 dark:text-gray-400 leading-relaxed">${escapeHtml(tool.description)}</p>
              </div>
            ` : ""}

            <div class="flex flex-wrap gap-3 mb-8">
              <a href="${escapeHtml(tool.url)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-6 py-3 bg-black dark:bg-white text-white dark:text-black rounded-xl font-medium hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors">
                访问网站
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
              </a>
              <button onclick="doShare()" class="inline-flex items-center gap-2 px-6 py-3 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-xl font-medium hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                分享
              </button>
            </div>

            <div class="border-t border-gray-200 dark:border-gray-700 pt-6">
              <div class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400">
                发布于 ${escapeHtml(formatDate(tool.createdAt))}
              </div>
            </div>
          </div>
        </div>
        ${renderFooter()}
      `;
    }

    // ============================================================
    // 页面：提交
    // ============================================================
    function renderSubmit() {
      return `
        ${renderHeader("")}
        <div class="container mx-auto px-4 py-8">
          <a href="#/" class="inline-flex items-center gap-2 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white mb-8">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            返回作品集
          </a>
          <div class="max-w-xl mx-auto bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-6 sm:p-8">
            <div class="flex items-center gap-3 mb-8">
              <div class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-blue-100 dark:bg-blue-900">
                <span class="text-blue-600 dark:text-blue-400 text-xl">+</span>
              </div>
              <div>
                <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white">提交 AI 作品</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400">分享你创建或发现的优秀 AI Web 应用</p>
              </div>
            </div>
            <form onsubmit="onSubmitForm(event)" class="space-y-5">
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">应用名称 <span class="text-red-500">*</span></label>
                <input type="text" name="name" required placeholder="例如：ChatGPT、Midjourney..."
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">应用链接 <span class="text-red-500">*</span></label>
                <input type="text" name="url" required placeholder="https://example.com"
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="mt-1 text-xs text-gray-400 dark:text-gray-500">输入完整链接，例如 https://example.com</p>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">简介 <span class="text-gray-400">(选填)</span></label>
                <textarea name="description" rows="3" placeholder="简单介绍一下这个应用的功能和特点..."
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
              </div>
              <button type="submit" class="w-full py-3 rounded-xl bg-black dark:bg-white text-white dark:text-black font-medium hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors">提交作品</button>
            </form>
          </div>
        </div>
        ${renderFooter()}
      `;
    }

    // ============================================================
    // 全局状态 & 渲染
    // ============================================================
    const state = { search: "", category: null };

    function render() {
      const route = getRoute();
      const app = document.getElementById("app");
      if (route.name === "home") {
        app.innerHTML = renderHome(state);
      } else if (route.name === "detail") {
        app.innerHTML = renderDetail(route.id);
      } else if (route.name === "submit") {
        app.innerHTML = renderSubmit();
      }
      applyDark();
    }

    // ============================================================
    // 交互处理
    // ============================================================
    window.onSearchInput = function (v) {
      state.search = v;
      const route = getRoute();
      if (route.name === "home") {
        // 只更新搜索框和列表
        const newHome = renderHome(state);
        const app = document.getElementById("app");
        // 简单做法：整体重渲染，保持滚动位置
        const scroll = window.scrollY;
        app.innerHTML = newHome;
        window.scrollTo(0, scroll);
        // 保持焦点
        const inputs = app.querySelectorAll('input[type="search"]');
        if (inputs.length > 0) {
          inputs[0].focus();
          inputs[0].setSelectionRange(v.length, v.length);
        }
      }
    };

    window.onCategoryClick = function (cat) {
      state.category = (state.category === cat) ? null : cat;
      render();
    };

    window.clearFilters = function () {
      state.search = "";
      state.category = null;
      render();
    };

    window.onSubmitForm = async function (e) {
      e.preventDefault();
      const form = e.target;
      const name = form.name.value.trim();
      let url = form.url.value.trim();
      const description = form.description.value.trim();

      if (!name) { alert("请输入应用名称"); return; }
      if (!url) { alert("请输入应用链接"); return; }
      if (!/^https?:\/\//i.test(url)) url = "https://" + url;
      try { new URL(url); } catch (err) { alert("请输入有效的链接地址"); return; }

      const app = document.getElementById("app");
      const originalHtml = app.innerHTML;
      app.innerHTML = `
        ${renderHeader("")}
        <div class="min-h-[60vh] flex items-center justify-center">
          <div class="text-gray-500 text-lg">提交中…</div>
        </div>
        ${renderFooter()}
      `;

      try {
        const r = await fetch(PB + "/api/collections/tools/records", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: name, url: url, description: description })
        });
        if (!r.ok) {
          const txt = await r.text().catch(function () { return ""; });
          throw new Error("HTTP " + r.status + " " + txt);
        }
        // 刷新数据
        await loadTools();
        // 成功页
        app.innerHTML = `
          ${renderHeader("")}
          <div class="min-h-[60vh] flex flex-col items-center justify-center gap-3">
            <div class="text-6xl">✓</div>
            <div class="text-xl font-semibold text-gray-900 dark:text-white">提交成功！</div>
            <div class="text-gray-500">${escapeHtml(name)} 已添加到作品集</div>
          </div>
          ${renderFooter()}
        `;
        setTimeout(function () { location.hash = "#/"; }, 1500);
      } catch (err) {
        app.innerHTML = `
          ${renderHeader("")}
          <div class="min-h-[60vh] flex flex-col items-center justify-center gap-3">
            <div class="text-xl font-semibold text-red-600">提交失败</div>
            <div class="text-gray-500 text-sm">${escapeHtml(err.message || "")}</div>
            <button onclick="location.hash='#/submit'" class="mt-2 text-blue-600 hover:underline">重新填写</button>
          </div>
          ${renderFooter()}
        `;
      }
    };

    window.doShare = async function () {
      try {
        if (navigator.share) {
          await navigator.share({ title: document.title, url: location.href });
        } else {
          await navigator.clipboard.writeText(location.href);
          alert("链接已复制到剪贴板！");
        }
      } catch (e) {}
    };

    window.toggleDark = function () {
      const isDark = document.documentElement.classList.toggle("dark");
      localStorage.theme = isDark ? "dark" : "light";
      applyDark();
    };

    function applyDark() {
      const icon = document.getElementById("theme-icon");
      if (icon) icon.textContent = document.documentElement.classList.contains("dark") ? "🌙" : "☀";
    }

    // 初始化
    (function () {
      // 主题
      if (localStorage.theme === "dark" || (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }
      loadTools();
    })();
  </script>
</body>
</html>
